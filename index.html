<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра Васи — Учим русский язык!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@400;700;800&display=swap');

  :root {
    --sky: #6EC6F5;
    --grass: #5DBB63;
    --sun: #FFD93D;
    --berry: #FF6B6B;
    --cloud: #FFFFFF;
    --bark: #8B5E3C;
    --night: #1A2744;
    --card: #FFFDF0;
    --correct: #43C462;
    --wrong: #FF5252;
    --gold: #FFD700;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, #B8E8FF 60%, #D4F5D4 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== CLOUDS ===== */
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    animation: floatCloud linear infinite;
    pointer-events: none;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 40px; top: 8%; animation-duration: 35s; }
  .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
  .cloud-1::after { width: 45px; height: 45px; top: -20px; left: 50px; }
  .cloud-2 { width: 80px; height: 28px; top: 18%; animation-duration: 48s; animation-delay: -15s; }
  .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
  .cloud-2::after { width: 30px; height: 30px; top: -14px; left: 35px; }
  .cloud-3 { width: 100px; height: 34px; top: 5%; animation-duration: 42s; animation-delay: -28s; }
  .cloud-3::before { width: 50px; height: 50px; top: -25px; left: 12px; }
  .cloud-3::after { width: 38px; height: 38px; top: -18px; left: 45px; }

  @keyframes floatCloud {
    from { left: -200px; }
    to { left: 110vw; }
  }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    padding: 20px 16px 12px;
    position: relative;
    z-index: 10;
  }

  .title-box {
    display: inline-block;
    background: var(--sun);
    border-radius: 24px;
    padding: 10px 28px 14px;
    box-shadow: 0 6px 0 #C8A800, 0 8px 20px rgba(0,0,0,0.15);
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: var(--night);
    line-height: 1.1;
  }

  h1 .name { color: var(--berry); }

  .score-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .star-count {
    background: white;
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 1.2rem;
    font-weight: 900;
    box-shadow: 0 3px 0 #ddd;
    color: var(--night);
  }

  .level-badge {
    background: var(--grass);
    color: white;
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 1rem;
    font-weight: 700;
    box-shadow: 0 3px 0 #3A8A3F;
  }

  /* ===== MAIN GAME AREA ===== */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 10px 16px 40px;
    position: relative;
    z-index: 10;
  }

  /* ===== CHARACTER ===== */
  .character-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }

  .character {
    font-size: 4rem;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    transition: transform 0.2s;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .character.celebrate {
    animation: celebrate 0.6s ease-in-out;
  }

  @keyframes celebrate {
    0% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.4) rotate(-15deg); }
    50% { transform: scale(1.4) rotate(15deg); }
    75% { transform: scale(1.2) rotate(-8deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .character.sad {
    animation: shake 0.5s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }

  /* ===== SPEECH BUBBLE ===== */
  .bubble {
    background: white;
    border-radius: 20px;
    padding: 14px 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #d0d0d0, 0 6px 16px rgba(0,0,0,0.08);
    position: relative;
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    line-height: 1.6;
    color: #333;
    min-height: 52px;
    text-align: center;
  }

  .bubble::before {
    content: '';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-bottom: 18px solid white;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    background: var(--card);
    border-radius: 24px;
    padding: 20px 20px 22px;
    box-shadow: 0 6px 0 #E8D98A, 0 10px 28px rgba(0,0,0,0.1);
    margin-bottom: 16px;
    border: 3px solid #FFE169;
  }

  .task-type-badge {
    display: inline-block;
    background: var(--bark);
    color: white;
    border-radius: 50px;
    padding: 3px 14px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }

  .task-text {
    font-size: clamp(1.1rem, 3.5vw, 1.35rem);
    font-weight: 700;
    color: var(--night);
    line-height: 1.7;
    margin-bottom: 6px;
  }

  .task-emoji {
    font-size: 2.5rem;
    text-align: center;
    display: block;
    margin-bottom: 8px;
  }

  /* ===== BLANK FILL ===== */
  .sentence-parts {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    font-size: clamp(1.05rem, 3vw, 1.25rem);
    font-weight: 700;
    color: var(--night);
    line-height: 2;
    margin-bottom: 12px;
  }

  .blank-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 90px;
    padding: 4px 10px;
    background: #EEF6FF;
    border: 3px dashed #6EC6F5;
    border-radius: 12px;
    font-size: clamp(1rem, 2.8vw, 1.15rem);
    font-weight: 900;
    color: #1A5E8A;
    transition: all 0.3s;
    cursor: default;
  }

  .blank-slot.filled {
    background: #D4F5D4;
    border: 3px solid var(--correct);
    color: var(--correct);
    animation: pop 0.3s ease;
  }

  .blank-slot.wrong {
    background: #FFE8E8;
    border: 3px solid var(--wrong);
    color: var(--wrong);
    animation: popWrong 0.3s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @keyframes popWrong {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.08) rotate(-3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* ===== OPTIONS BUTTONS ===== */
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 14px;
  }

  .opt-btn {
    background: white;
    border: 3px solid var(--sky);
    border-radius: 16px;
    padding: 10px 22px;
    font-size: clamp(1rem, 3vw, 1.15rem);
    font-weight: 800;
    color: var(--night);
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 4px 0 #A8DCFF;
    font-family: 'Nunito', sans-serif;
    min-width: 100px;
  }

  .opt-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 7px 0 #A8DCFF;
    background: #EEF6FF;
  }

  .opt-btn:active:not(:disabled) {
    transform: translateY(1px);
    box-shadow: 0 2px 0 #A8DCFF;
  }

  .opt-btn.correct {
    background: var(--correct);
    border-color: #2A9A40;
    color: white;
    box-shadow: 0 4px 0 #1A7A30;
  }

  .opt-btn.wrong {
    background: var(--wrong);
    border-color: #CC2020;
    color: white;
    box-shadow: 0 4px 0 #AA1010;
  }

  .opt-btn:disabled { cursor: default; }

  /* ===== WHO-DOES-WHAT TASK ===== */
  .picture-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0;
  }

  .picture-card {
    background: white;
    border-radius: 18px;
    padding: 16px 10px 12px;
    text-align: center;
    cursor: pointer;
    border: 3px solid #ddd;
    box-shadow: 0 4px 0 #ccc;
    transition: all 0.2s;
  }

  .picture-card:hover:not(.disabled) {
    transform: translateY(-4px);
    border-color: var(--sky);
    box-shadow: 0 8px 0 #A8DCFF;
  }

  .picture-card .pic-emoji {
    font-size: 3.2rem;
    display: block;
    margin-bottom: 6px;
  }

  .picture-card .pic-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: #555;
    line-height: 1.3;
  }

  .picture-card.correct {
    border-color: var(--correct);
    background: #ECFFE8;
    box-shadow: 0 4px 0 #2A9A40;
  }

  .picture-card.wrong {
    border-color: var(--wrong);
    background: #FFE8E8;
    box-shadow: 0 4px 0 #CC2020;
  }

  .picture-card.disabled { cursor: default; }

  /* ===== NEXT BUTTON ===== */
  .next-btn {
    width: 100%;
    background: var(--berry);
    border: none;
    border-radius: 18px;
    padding: 14px 20px;
    font-size: 1.2rem;
    font-weight: 900;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 0 #C83030;
    transition: all 0.18s;
    font-family: 'Baloo 2', cursive;
    display: none;
    margin-top: 14px;
  }

  .next-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 9px 0 #C83030;
  }

  .next-btn:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #C83030;
  }

  /* ===== FEEDBACK ===== */
  .feedback {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 800;
    padding: 10px 16px;
    border-radius: 14px;
    margin-top: 12px;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback.correct { background: #D4FFD8; color: #1A7A30; }
  .feedback.wrong { background: #FFE0E0; color: #CC2020; }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall 1.4s ease-in forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* ===== PROGRESS ===== */
  .progress-track {
    background: rgba(255,255,255,0.5);
    border-radius: 50px;
    height: 12px;
    margin: 10px 0 14px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--grass), var(--sun));
    border-radius: 50px;
    transition: width 0.5s ease;
  }

  /* ===== WIN SCREEN ===== */
  .win-screen {
    display: none;
    text-align: center;
    padding: 30px 20px;
    animation: fadeIn 0.5s ease;
  }

  .win-screen h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    color: var(--night);
    margin: 16px 0 8px;
  }

  .win-emoji { font-size: 5rem; }

  .win-stars { font-size: 2.5rem; letter-spacing: 4px; }

  .restart-btn {
    background: var(--grass);
    border: none;
    border-radius: 18px;
    padding: 14px 36px;
    font-size: 1.2rem;
    font-weight: 900;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 0 #3A8A3F;
    margin-top: 20px;
    font-family: 'Baloo 2', cursive;
    transition: all 0.2s;
  }

  .restart-btn:hover { transform: translateY(-3px); }

  /* ===== HINT ===== */
  .hint-wrap { margin-top: 10px; text-align: center; }
  .hint-btn {
    background: none;
    border: 2px dashed #aaa;
    border-radius: 10px;
    padding: 6px 18px;
    color: #888;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .hint-btn:hover { border-color: var(--bark); color: var(--bark); }
  .hint-text {
    display: none;
    background: #FFF9E0;
    border: 2px solid var(--sun);
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 0.9rem;
    color: #7A5E00;
    margin-top: 8px;
    animation: fadeIn 0.3s ease;
  }
</style>
</head>
<body>

<!-- Clouds -->
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<header>
  <div class="title-box">
    <h1>Привет, <span class="name">Вася!</span> 🌟</h1>
    <div style="font-size:0.95rem; color:#555; font-weight:700;">Учим русский вместе — это весело!</div>
  </div>
  <div class="score-bar">
    <div class="star-count">⭐ <span id="starCount">0</span></div>
    <div class="level-badge">Задание <span id="taskNum">1</span> из <span id="taskTotal">12</span></div>
  </div>
  <div class="progress-track" style="max-width:500px;margin:10px auto 0;">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</header>

<main>
  <div class="character-wrap">
    <div class="character" id="character">🦊</div>
  </div>

  <div class="bubble" id="bubble">Привет, Вася! Я — лисёнок Рыжик. Помоги мне — поиграем вместе!</div>

  <!-- Game area -->
  <div id="gameArea">
    <div class="task-card" id="taskCard">
      <!-- filled by JS -->
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="hint-wrap" id="hintWrap">
      <button class="hint-btn" onclick="showHint()">💡 Подсказка</button>
      <div class="hint-text" id="hintText"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextTask()">Дальше! →</button>
  </div>

  <!-- Win screen -->
  <div class="win-screen" id="winScreen">
    <div class="win-emoji">🏆</div>
    <h2>Вася — молодец!</h2>
    <p style="font-size:1.1rem; color:#555; font-weight:700;">Ты справился со всеми заданиями!</p>
    <div class="win-stars" id="winStars">⭐⭐⭐</div>
    <br>
    <button class="restart-btn" onclick="restart()">Играть снова! 🎉</button>
  </div>
</main>

<script>
// ===== TASKS DATA =====
const TASKS = [
  // TYPE 1: Fill in the blank (вставить слово в нужной форме)
  {
    type: 'fill',
    emoji: '🐻',
    sentence: ['Медведь забрался в', 'BLANK1', ', чтобы выспаться зимой.'],
    blanks: { BLANK1: { word: 'берлогу', hint: 'Скажи: «залез КУДА? — в берлогу»' } },
    options: ['берлогу', 'берлога', 'берлоге'],
    bubble: 'Мишка спит зимой! Куда он залез?',
    correct_bubble: 'Правильно! Медведь залез в берлогу!'
  },
  {
    type: 'fill',
    emoji: '🐰',
    sentence: ['Заяц бежал по', 'BLANK1', ', чтобы спастись от', 'BLANK2', '.'],
    blanks: {
      BLANK1: { word: 'снегу', hint: 'Скажи: «бежал ПО чему? — по снегу»' },
      BLANK2: { word: 'волка', hint: 'Скажи: «спастись ОТ кого? — от волка»' }
    },
    multiOptions: {
      BLANK1: ['снегу', 'снег', 'снегом'],
      BLANK2: ['волка', 'волку', 'волк']
    },
    bubble: 'Зайчик убегает! Помоги заполнить пропуски!',
    correct_bubble: 'Ура! Зайчик убежал от волка!'
  },
  {
    type: 'fill',
    emoji: '🏠',
    sentence: ['Под', 'BLANK1', 'висят сосульки. Под', 'BLANK2', 'ходить опасно.'],
    blanks: {
      BLANK1: { word: 'крышей', hint: 'Скажи: «под ЧЕМ? — под крышей»' },
      BLANK2: { word: 'сосульками', hint: 'Скажи: «под ЧЕМ? — под сосульками»' }
    },
    multiOptions: {
      BLANK1: ['крышей', 'крыша', 'крышу'],
      BLANK2: ['сосульками', 'сосульки', 'сосулькам']
    },
    bubble: 'Осторожно — сосульки! Подумай, какое слово подходит.',
    correct_bubble: 'Отлично! Сосульки висят под крышей!'
  },
  {
    type: 'fill',
    emoji: '🦅',
    sentence: ['Я вижу, что', 'BLANK1', 'нравится есть ягоды', 'BLANK2', '.'],
    blanks: {
      BLANK1: { word: 'снегирям', hint: 'Скажи: «кому нравится? — снегирям»' },
      BLANK2: { word: 'рябины', hint: 'Скажи: «ягоды ЧЕГО? — ягоды рябины»' }
    },
    multiOptions: {
      BLANK1: ['снегирям', 'снегири', 'снегирей'],
      BLANK2: ['рябины', 'рябина', 'рябине']
    },
    bubble: 'Птички клюют ягоды! Какое слово нужно?',
    correct_bubble: 'Здорово! Снегири любят ягоды рябины!'
  },
  {
    type: 'fill',
    emoji: '🐿️',
    sentence: ['Я насыпал', 'BLANK1', 'семечек. Они лежали на', 'BLANK2', ', а белки всё не было.'],
    blanks: {
      BLANK1: { word: 'белке', hint: 'Скажи: «насыпал КОМУ? — белке»' },
      BLANK2: { word: 'снегу', hint: 'Скажи: «лежали НА чём? — на снегу»' }
    },
    multiOptions: {
      BLANK1: ['белке', 'белку', 'белки'],
      BLANK2: ['снегу', 'снег', 'снегом']
    },
    bubble: 'Угощение для белочки! Подбери нужные слова.',
    correct_bubble: 'Умница! Ты насыпал белке семечек на снег!'
  },
  {
    type: 'fill',
    emoji: '🐿️',
    sentence: ['Наконец одной белке захотелось семечек и она спрыгнула с', 'BLANK1', 'на снег и стала', 'BLANK2', 'их брать.'],
    blanks: {
      BLANK1: { word: 'ветки', hint: 'Скажи: «спрыгнула С чего? — с ветки»' },
      BLANK2: { word: 'лапками', hint: 'Скажи: «брать ЧЕМ? — лапками»' }
    },
    multiOptions: {
      BLANK1: ['ветки', 'ветку', 'ветке'],
      BLANK2: ['лапками', 'лапки', 'лапок']
    },
    bubble: 'Белочка прыгает! Помоги рассказать как!',
    correct_bubble: 'Супер! Белочка спрыгнула с ветки и взяла лапками!'
  },
  {
    type: 'fill',
    emoji: '🦊',
    sentence: ['Я видел, как за', 'BLANK1', 'бежала собака, но', 'BLANK2', 'не догнала.'],
    blanks: {
      BLANK1: { word: 'лисой', hint: 'Скажи: «бежала ЗА кем? — за лисой»' },
      BLANK2: { word: 'лису', hint: 'Скажи: «не догнала КОГО? — лису»' }
    },
    multiOptions: {
      BLANK1: ['лисой', 'лису', 'лиса'],
      BLANK2: ['лису', 'лиса', 'лисой']
    },
    bubble: 'Лиска убегает от собаки! Как правильно сказать?',
    correct_bubble: 'Молодец! Собака бежала за лисой, но не догнала лису!'
  },
  {
    type: 'fill',
    emoji: '🦊',
    sentence: ['Лиса спряталась в', 'BLANK1', '.'],
    blanks: {
      BLANK1: { word: 'нору', hint: 'Скажи: «спряталась КУДА? — в нору»' }
    },
    options: ['нору', 'норе', 'нора'],
    bubble: 'Куда убежала хитрая лиса?',
    correct_bubble: 'Правильно! Лиса спряталась в нору — молодец!'
  },

  // TYPE 2: Who does what (кто-кого)

// ===== STATE =====
let currentTask = 0;
let stars = 0;
let currentBlanks = {};
let multiStep = null; // for multi-blank tasks

const CHARACTERS = ['🦊','🐸','🐻','🐰','🐿️','🦉','🐼','🦁'];
let charIdx = 0;

function getChar() { return CHARACTERS[charIdx % CHARACTERS.length]; }

function setBubble(text) {
  document.getElementById('bubble').textContent = text;
}

function setChar(emoji) {
  document.getElementById('character').textContent = emoji;
}

// ===== AUDIO (Web Audio API tones) =====
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.3) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playCorrect() {
  playTone(523, 0.15); 
  setTimeout(() => playTone(659, 0.15), 120);
  setTimeout(() => playTone(784, 0.25), 240);
}

function playWrong() {
  playTone(300, 0.18, 'sawtooth', 0.2);
  setTimeout(() => playTone(250, 0.25, 'sawtooth', 0.2), 150);
}

function playWin() {
  [523,587,659,698,784,880].forEach((f,i) => {
    setTimeout(() => playTone(f, 0.2, 'sine', 0.35), i * 100);
  });
}

// ===== CONFETTI =====
function confetti() {
  const colors = ['#FFD700','#FF6B6B','#6EC6F5','#5DBB63','#FF9F43','#A29BFE'];
  for (let i = 0; i < 28; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-20px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      el.style.width = (8 + Math.random()*10) + 'px';
      el.style.height = (8 + Math.random()*10) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }, i * 50);
  }
}

// ===== RENDER TASK =====
function renderTask() {
  const task = TASKS[currentTask];
  const card = document.getElementById('taskCard');
  const hintText = document.getElementById('hintText');
  hintText.style.display = 'none';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('hintWrap').style.display = 'block';

  charIdx = currentTask;
  setChar(getChar());
  setBubble(task.bubble);

  // Update header
  document.getElementById('taskNum').textContent = currentTask + 1;
  document.getElementById('taskTotal').textContent = TASKS.length;
  document.getElementById('progressFill').style.width = (currentTask / TASKS.length * 100) + '%';

  if (task.type === 'fill') {
    renderFill(task, card);
  } else {
    renderWhoWhat(task, card);
  }
}

function renderFill(task, card) {
  currentBlanks = {};
  // determine if multi-blank
  const blankKeys = Object.keys(task.blanks);
  
  let html = `<span class="task-type-badge">🖊️ Вставь нужное слово</span>`;
  html += `<span class="task-emoji">${task.emoji}</span>`;
  html += `<div class="sentence-parts">`;

  task.sentence.forEach(part => {
    if (blankKeys.includes(part)) {
      html += `<span class="blank-slot" id="slot_${part}" data-key="${part}">_____</span>`;
    } else {
      html += `<span>${part}</span>`;
    }
  });
  html += `</div>`;

  // If single blank with 'options'
  if (task.options) {
    html += `<div class="options" id="optionsArea">`;
    task.options.forEach(opt => {
      html += `<button class="opt-btn" onclick="checkFill('${blankKeys[0]}', '${opt}', this, ${JSON.stringify(task.blanks[blankKeys[0]].word === opt)})">${opt}</button>`;
    });
    html += `</div>`;
  } else {
    // Multi-blank: show first blank's options
    multiStep = { keys: blankKeys, step: 0, task };
    html += `<div id="multiPrompt" style="font-size:0.9rem;color:#666;font-weight:700;margin-bottom:6px;text-align:center;">Выбери слово для первого пропуска ↑</div>`;
    html += `<div class="options" id="optionsArea">`;
    task.multiOptions[blankKeys[0]].forEach(opt => {
      const correct = task.blanks[blankKeys[0]].word === opt;
      html += `<button class="opt-btn" onclick="checkMultiFill('${blankKeys[0]}', '${opt}', this, ${correct})">${opt}</button>`;
    });
    html += `</div>`;
  }

  card.innerHTML = html;
  if (task.blanks) {
    const firstKey = blankKeys[0];
    document.getElementById('hintText').textContent = task.blanks[firstKey].hint;
  }
}

function checkFill(key, chosen, btn, isCorrect) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const slot = document.getElementById('slot_' + key);
  
  if (isCorrect) {
    slot.textContent = chosen;
    slot.classList.add('filled');
    btn.classList.add('correct');
    onCorrect();
  } else {
    slot.textContent = chosen;
    slot.classList.add('wrong');
    btn.classList.add('wrong');
    onWrong(TASKS[currentTask].blanks[key].hint);
    setTimeout(() => {
      slot.textContent = '_____';
      slot.classList.remove('wrong');
      document.querySelectorAll('.opt-btn').forEach(b => {
        b.disabled = false;
        b.classList.remove('wrong');
      });
    }, 1200);
  }
}

function checkMultiFill(key, chosen, btn, isCorrect) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const slot = document.getElementById('slot_' + key);
  const task = multiStep.task;
  const keys = multiStep.keys;

  if (isCorrect) {
    slot.textContent = chosen;
    slot.classList.add('filled');
    btn.classList.add('correct');
    playCorrect();

    multiStep.step++;
    if (multiStep.step < keys.length) {
      // Move to next blank
      const nextKey = keys[multiStep.step];
      setTimeout(() => {
        document.getElementById('multiPrompt').textContent = `Отлично! Теперь выбери слово для следующего пропуска ↑`;
        const optArea = document.getElementById('optionsArea');
        optArea.innerHTML = '';
        task.multiOptions[nextKey].forEach(opt => {
          const correct2 = task.blanks[nextKey].word === opt;
          const b = document.createElement('button');
          b.className = 'opt-btn';
          b.textContent = opt;
          b.onclick = () => checkMultiFill(nextKey, opt, b, correct2);
          optArea.appendChild(b);
        });
        document.getElementById('hintText').textContent = task.blanks[nextKey].hint;
        document.getElementById('hintText').style.display = 'none';
      }, 600);
    } else {
      onCorrect();
    }
  } else {
    slot.textContent = chosen;
    slot.classList.add('wrong');
    btn.classList.add('wrong');
    playWrong();
    shakeBubble();

    setTimeout(() => {
      slot.textContent = '_____';
      slot.classList.remove('wrong');
      document.querySelectorAll('.opt-btn').forEach(b => {
        b.disabled = false;
        b.classList.remove('wrong');
      });
    }, 1200);
  }
}

function renderWhoWhat(task, card) {
  let html = `<span class="task-type-badge">🔍 Кто что делает?</span>`;
  html += `<span class="task-emoji">${task.emoji}</span>`;
  html += `<div class="task-text">${task.question}</div>`;
  html += `<div class="picture-pair">`;
  task.cards.forEach((c, i) => {
    html += `<div class="picture-card" id="pic_${i}" onclick="checkWhoWhat(${i})">
      <span class="pic-emoji">${c.emoji}</span>
      <span class="pic-label">${c.label}</span>
    </div>`;
  });
  html += `</div>`;
  card.innerHTML = html;
  document.getElementById('hintText').textContent = task.hint;
}

function checkWhoWhat(idx) {
  const task = TASKS[currentTask];
  document.querySelectorAll('.picture-card').forEach(c => c.classList.add('disabled'));
  document.querySelectorAll('.picture-card').forEach(c => c.onclick = null);

  const chosen = task.cards[idx];
  const pic = document.getElementById('pic_' + idx);

  if (chosen.correct) {
    pic.classList.add('correct');
    onCorrect();
  } else {
    pic.classList.add('wrong');
    // also highlight correct
    task.cards.forEach((c, i) => {
      if (c.correct) document.getElementById('pic_' + i).classList.add('correct');
    });
    onWrong(task.hint);
  }
}

// ===== OUTCOME =====
function onCorrect() {
  stars++;
  document.getElementById('starCount').textContent = stars;
  playCorrect();
  confetti();

  const char = document.getElementById('character');
  char.classList.remove('sad');
  char.classList.add('celebrate');
  setTimeout(() => char.classList.remove('celebrate'), 700);

  const fb = document.getElementById('feedback');
  fb.textContent = '✅ ' + TASKS[currentTask].correct_bubble;
  fb.className = 'feedback correct';
  fb.style.display = 'block';

  setBubble(TASKS[currentTask].correct_bubble);
  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('hintWrap').style.display = 'none';
}

function onWrong(hint) {
  playWrong();
  shakeBubble();

  const char = document.getElementById('character');
  char.classList.remove('celebrate');
  char.classList.add('sad');
  setTimeout(() => char.classList.remove('sad'), 600);

  const fb = document.getElementById('feedback');
  fb.textContent = '❌ Попробуй ещё раз! ' + (hint || '');
  fb.className = 'feedback wrong';
  fb.style.display = 'block';
  setTimeout(() => { fb.style.display = 'none'; }, 2000);
  setBubble('Ой! Попробуй ещё раз, Вася!');
}

function shakeBubble() {
  const b = document.getElementById('bubble');
  b.style.animation = 'none';
  b.offsetHeight;
  b.style.animation = '';
}

// ===== HINT =====
function showHint() {
  const ht = document.getElementById('hintText');
  ht.style.display = ht.style.display === 'block' ? 'none' : 'block';
}

// ===== NEXT / WIN =====
function nextTask() {
  currentTask++;
  if (currentTask >= TASKS.length) {
    showWin();
  } else {
    renderTask();
  }
}

function showWin() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('bubble').style.display = 'none';
  document.getElementById('winScreen').style.display = 'block';
  document.querySelector('.character-wrap').style.display = 'none';
  document.getElementById('winStars').textContent = '⭐'.repeat(Math.min(stars, TASKS.length));
  playWin();
  confetti(); confetti();
  setBubble('Ура, Вася! Ты настоящий герой!');
}

function restart() {
  currentTask = 0;
  stars = 0;
  document.getElementById('starCount').textContent = '0';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('bubble').style.display = 'block';
  document.getElementById('winScreen').style.display = 'none';
  document.querySelector('.character-wrap').style.display = 'flex';
  renderTask();
}

// ===== INIT =====
renderTask();
</script>
